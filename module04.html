<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOD·04 // Reality — Speculation Capsule</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #03040a;
    --c: #00b4ff;
    --cr: 0,180,255;
    --star: #c8c4ff;
    --panel: #080614;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; background: var(--void); color: var(--star); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 50% at 10% 20%, rgba(var(--cr),0.08) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 90% 80%, rgba(var(--cr),0.05) 0%, transparent 55%); pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(var(--cr),0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(var(--cr),0.025) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; pointer-events: none; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(3,4,10,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(var(--cr),0.14); padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-weight: 700; font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--star); text-decoration: none; display: flex; align-items: center; gap: 0.75rem; }
  .logo-gem { width: 10px; height: 10px; background: var(--c); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); box-shadow: 0 0 10px var(--c); }
  .header-right { font-family: 'Courier Prime', monospace; font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(200,196,255,0.22); }
  .mod-hero { position: relative; z-index: 1; padding: 3rem 2rem 2.5rem; border-bottom: 1px solid rgba(var(--cr),0.1); display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem; overflow: hidden; }
  .mod-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 100% at 0% 50%, rgba(var(--cr),0.06) 0%, transparent 60%); pointer-events: none; }
  .mod-eyebrow { font-family: 'Courier Prime', monospace; font-size: 0.55rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--c); opacity: 0.75; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .mod-eyebrow::before { content: ''; width: 5px; height: 5px; background: var(--c); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); box-shadow: 0 0 6px var(--c); }
  .mod-title { font-weight: 700; font-size: clamp(2rem, 5vw, 4rem); letter-spacing: 0.08em; text-transform: uppercase; line-height: 0.9; color: var(--c); text-shadow: 0 0 40px rgba(var(--cr),0.3); }
  .mod-right { font-family: 'Courier Prime', monospace; font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(200,196,255,0.18); text-align: right; line-height: 2; white-space: nowrap; }
  .mod-count-big { font-weight: 700; font-size: 5.5rem; line-height: 1; color: transparent; -webkit-text-stroke: 1px rgba(var(--cr),0.18); letter-spacing: -0.05em; display: block; }
  .nav-row { position: relative; z-index: 1; padding: 1rem 2rem 0.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; border-bottom: 1px solid rgba(var(--cr),0.07); }
  .nav-btn { font-family: 'Courier Prime', monospace; font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--star); background: transparent; border: 1px solid rgba(var(--cr),0.3); padding: 0.42rem 1.1rem; text-decoration: none; transition: all 0.2s; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }
  .nav-btn:hover { background: rgba(var(--cr),0.14); border-color: var(--c); color: #fff; }
  .main { position: relative; z-index: 1; padding: 2rem; }
  .section-label { font-family: 'Courier Prime', monospace; font-size: 0.5rem; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(200,196,255,0.2); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.6rem; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(var(--cr),0.25), transparent); }
  .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; background: rgba(var(--cr),0.06); border: 1px solid rgba(var(--cr),0.06); }
  .proj-card { background: var(--panel); cursor: pointer; position: relative; overflow: hidden; transition: background 0.2s; border: 1px solid rgba(var(--cr),0.07); }
  .proj-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, var(--c), transparent); opacity: 0.5; }
  .proj-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at top right, rgba(var(--cr),0.07) 0%, transparent 60%); opacity: 0; transition: opacity 0.3s; z-index: 1; }
  .proj-card:hover { background: #0d0b1e; border-color: rgba(var(--cr),0.35); }
  .proj-card:hover::before { opacity: 1; }
  .proj-card:hover .card-img { transform: scale(1.04); filter: brightness(0.9) saturate(1.15); }
  .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; filter: brightness(0.68) saturate(0.7); transition: filter 0.3s, transform 0.4s; background: #0a0820; }
  .card-img-placeholder { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0d0b1e, #080614); font-family: 'Courier Prime', monospace; font-size: 0.5rem; letter-spacing: 0.2em; color: rgba(var(--cr),0.3); text-transform: uppercase; flex-direction: column; gap: 0.5rem; }
  .card-label { padding: 0.6rem 0.7rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(var(--cr),0.08); position: relative; z-index: 2; }
  .card-tag { font-family: 'Courier Prime', monospace; font-size: 0.48rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--c); opacity: 0.85; display: flex; align-items: center; gap: 0.35rem; }
  .card-tag::before { content: ''; width: 4px; height: 4px; background: var(--c); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); box-shadow: 0 0 5px var(--c); }
  .card-open { font-family: 'Courier Prime', monospace; font-size: 0.46rem; letter-spacing: 0.12em; color: rgba(200,196,255,0.2); text-transform: uppercase; transition: color 0.2s; }
  .proj-card:hover .card-open { color: var(--c); }
  .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(3,4,10,0.93); align-items: flex-start; justify-content: center; padding: 1rem; overflow-y: auto; backdrop-filter: blur(10px); }
  .modal.open { display: flex; }
  .modal-box { background: var(--panel); border: 1px solid rgba(var(--cr),0.22); width: 100%; max-width: 880px; position: relative; margin: auto; box-shadow: 0 0 80px rgba(var(--cr),0.1); }
  .modal-top-bar { height: 2px; background: linear-gradient(90deg, var(--c), #ff2d78, transparent); }
  .modal-header { padding: 1rem 1.25rem 0.85rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(var(--cr),0.1); }
  .modal-mod-id { font-family: 'Courier Prime', monospace; font-size: 0.52rem; font-weight: 700; letter-spacing: 0.25em; color: var(--c); background: rgba(var(--cr),0.1); border: 1px solid rgba(var(--cr),0.25); padding: 0.2rem 0.55rem; display: flex; align-items: center; gap: 0.4rem; }
  .modal-mod-id::before { content: ''; width: 5px; height: 5px; background: var(--c); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); box-shadow: 0 0 6px var(--c); }
  .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.15em; color: var(--star); text-transform: uppercase; flex: 1; margin: 0 0.75rem; }
  .modal-close { font-family: 'Courier Prime', monospace; font-size: 0.52rem; letter-spacing: 0.2em; color: rgba(200,196,255,0.35); background: transparent; border: 1px solid rgba(200,196,255,0.12); padding: 0.3rem 0.7rem; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
  .modal-close:hover { color: #fff; border-color: rgba(200,196,255,0.4); }
  .modal-img-wrap { position: relative; border-bottom: 1px solid rgba(var(--cr),0.1); background: #000; }
  .modal-img { width: 100%; max-height: 480px; display: block; object-fit: contain; }
  .modal-img-placeholder { min-height: 200px; display: flex; align-items: center; justify-content: center; font-family: 'Courier Prime', monospace; font-size: 0.55rem; letter-spacing: 0.22em; color: rgba(var(--cr),0.25); text-transform: uppercase; flex-direction: column; gap: 0.6rem; }
  .modal-body { padding: 1.5rem 1.25rem; }
  .modal-body p { font-family: 'EB Garamond', serif; font-size: 0.95rem; line-height: 1.88; color: rgba(200,196,255,0.62); margin-bottom: 1rem; }
  .modal-body p:last-of-type { margin-bottom: 0; }
  footer { position: relative; z-index: 1; text-align: center; padding: 2rem; border-top: 1px solid rgba(var(--cr),0.08); font-family: 'Courier Prime', monospace; font-size: 0.5rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(200,196,255,0.12); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <div class="logo-gem"></div>
    Speculation Capsule
  </a>
  <div class="header-right">ART104 · Spring 2026 · MOD·04</div>
</header>

<div class="mod-hero">
  <div>
    <div class="mod-eyebrow">module 04 · simulation · perception · constructed worlds</div>
    <h1 class="mod-title">Reality</h1>
  </div>
  <div class="mod-right">
    <span class="mod-count-big">07</span>
    07 artifacts<br>Spring 2026
  </div>
</div>

<div class="nav-row">
  <a href="module03.html" class="nav-btn">← Module 03</a>
  <a href="module05.html" class="nav-btn">Module 05 →</a>
</div>

<main class="main">
  <div class="section-label">7 artifacts · reality</div>
  <div class="project-grid" id="grid"></div>
</main>

<footer>ART104 · Spring 2026 · MOD·04 · 07 Artifacts · Speculation Capsule</footer>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-top-bar"></div>
    <div class="modal-header">
      <span class="modal-mod-id" id="modal-mod-label">MOD·04</span>
      <span class="modal-title" id="modal-title">Artifact 01</span>
      <button class="modal-close" onclick="closeModal()">✕ Close</button>
    </div>
    <div class="modal-img-wrap" id="modal-img-wrap">
      <div class="modal-img-placeholder"><span id="modal-img-label">image placeholder</span></div>
    </div>
    <div class="modal-body">
      <div id="modal-text"></div>
    </div>
  </div>
</div>

<script>
const moduleData = {
  "1": {
    img: "reality1.png",
    title: "Tai, Ryan, Samantha",
    p1: "This design is a futuristic form of virtual reality where a sentient VR headset connects to a user's thoughts and emotions, causing them to identify more with their in-game avatar than their real self. As players become more immersed, the game begins to shape their identity. Over time, this connection becomes so strong that the player is permanently trapped in the virtual world. It examines how advanced technology can blur the line between reality and simulation."
  },
  "2": {
    img: "reality2.png",
    title: "Phin, Zhiyun, Emis, Minh",
    p1: "Our work relates to feelings about memory and loss. We are interested in how technology can keep parts of people alive through images and data, but those pieces never feel fully real. That in-between feeling—present but not truly there—is something we think about a lot. It also connects to our thoughts about loneliness. Even with digital connection everywhere, people can still feel isolated.",
    p2: "Technology can recreate moments of closeness, but it cannot completely replace real presence. We made this piece to explore that tension between comfort and emptiness. We wanted to question whether virtual experiences can truly heal loss, or if they only create a temporary illusion of connection."
  },
  "3": {
    img: "reality3.png",
    title: "David C., Ethan, Miah",
    p1: "Our speculative artwork imagines what it would look like to be able to relive memories through VR. By linking with your mind, the headset would be able to create a digital environment unique to you. Inside, you would be able to choose and rewatch memories in an immersive environment as if from a different perspective. The amount of detail rendered depends on how much you recall—meaning people you may have forgotten about will show up as blurry or unfinished."
  },
  "4": {
    img: "reality4.png",
    title: "Gab, Jo, Stella",
    p1: "Wired Brain involves uploading your memories and conscience into a mobile video game where you can experience the digital realm in real time. It can be used post-death to relive memories or continue life. It exists in a futuristic world where this is the norm. You can discard physical form for a digital form. The piece is about taking something from our own reality—ourselves—and superimposing it onto another: the digital game reality."
  },
  "5": {
    img: "reality5.png",
    title: "David N., David P., Starr",
    p1: "The video game itself is a digital copy of the real world in which the player is playing as himself. The color tech behind the person sends brainwave signals to trick his mind into believing it is the real world. The controller is an AI controller that helps him make good decisions. The player can see the screen, but we cannot, as we are not on the same brainwave. The game ends once the player falls asleep and is freed from the technology."
  },
  "6": {
    img: "reality6.png",
    title: "Rosalva, Rosemarie, Chris",
    p1: "Our Virtual Identity allows users to become part of an inclusive self-portrait in virtual space. This work reflects ideas important to the theme of reality because we bring in the idea of hyper-reality—the notion that digital simulations can feel just as real as reality. It reflects our lived experience of always being online, where social media can feel just as tangible as the physical world. Some people in mainstream media tend to find ways to demonize video games; we wanted to show how life can be upgraded by gamifying it.",
    p2: "The goal is to suggest how technology should be a tool for human potential, not a replacement for it. We want to reflect and help visualize the gap between who we are now and who we want to be—and to advocate for technology that feels more integrated and human than faceless AI robots."
  },
  "7": {
    img: "reality7.png",
    title: "Chloe, Catherine, Brianna",
    p1: "Our final artwork, Are You Having Fun Yet?, focuses on the common threads throughout all of our sketches—among them a recurring composition with a punching bag character looming behind the VR player. One thing we wanted to make clear was the player's poor treatment of the fictional character, something that was lacking in some earlier sketches. We also wanted to convey a grand sense of scale, moving from the small fictional character in the hands of the player to the giant realized form of that character towering behind him."
  }
};

function buildGrid() {
  const grid = document.getElementById('grid');
  Object.keys(moduleData).forEach(id => {
    const d = moduleData[id];
    const card = document.createElement('div');
    card.className = 'proj-card';
    const imgEl = d.img ? `<img class="card-img" src="images/${d.img}" alt="artifact ${id}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
    const placeholderStyle = d.img ? 'display:none' : '';
    card.innerHTML = `
      ${imgEl}
      <div class="card-img-placeholder" style="${placeholderStyle}">
        <span>ART·${String(id).padStart(2,'0')}</span>
      </div>
      <div class="card-label">
        <span class="card-tag">ART·${String(id).padStart(2,'0')}</span>
        <span class="card-open">Open →</span>
      </div>`;
    card.addEventListener('click', () => openModal(id));
    grid.appendChild(card);
  });
}

function openModal(id) {
  const d = moduleData[id];
  const padId = String(id).padStart(2,'0');
  document.getElementById('modal-mod-label').textContent = `MOD·04 / ART·${padId}`;
  document.getElementById('modal-title').textContent = d.title || `Artifact ${padId}`;

  const wrap = document.getElementById('modal-img-wrap');
  if (d.img) {
    wrap.innerHTML = `<img class="modal-img" src="images/${d.img}" alt="artifact ${id}" onerror="this.outerHTML='<div class=modal-img-placeholder><span>image: ${d.img}</span></div>'">`;
  } else {
    wrap.innerHTML = `<div class="modal-img-placeholder"><span>image placeholder — ART·${padId}</span></div>`;
  }

  document.getElementById('modal-text').innerHTML = `
    <p>${d.p1}</p>
    ${d.p2 ? `<p>${d.p2}</p>` : ''}`;

  document.getElementById('modal').classList.add('open');
  document.getElementById('modal').scrollTop = 0;
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

buildGrid();
</script>
</body>
</html>
