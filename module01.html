  .hero {
    padding: 3rem 1.5rem 1.5rem;
    background: rgba(0,0,0,0.45);
  }
  .hero-eyebrow {

  .content {

    background: rgba(0,0,0,0.45);

  .img-grid {

    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 6px;
    margin-bottom: 2rem;
  }
  .img-grid-item {
    aspect-ratio: 4/3; overflow: hidden; cursor: pointer;
    background: #ddd; position: relative;
  }
  .img-grid-item img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.3s ease; filter: grayscale(15%);
  }
  .img-grid-item:hover img { transform: scale(1.04); filter: grayscale(0%); }
  .img-grid-item .img-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.55rem; letter-spacing: 0.08em;
    padding: 0.3rem 0.4rem; line-height: 1.3;
    opacity: 0; transition: opacity 0.2s;
  }
  .img-grid-item:hover .img-label { opacity: 1; }
  .module-nav {

    border-top: 1px solid rgba(255,255,255,0.15); padding-top: 1.2rem;

  }

    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(10,8,5,0.92);
    align-items: center; justify-content: center; padding: 1rem;
  }
  #lightbox.open { display: flex; }
  .lb-inner {
    max-width: 820px; width: 100%;
    display: flex; flex-direction: column;
    background: #111; max-height: 90vh; position: relative;
  }
  .lb-img-wrap {
    flex-shrink: 0; max-height: 55vh; overflow: hidden; background: #ddd;
  }
  .lb-img-wrap img {
    width: 100%; max-height: 55vh; object-fit: contain; display: block;
  }
  .lb-info {
    padding: 1.2rem 1.5rem 1.5rem; overflow-y: auto;
    -webkit-overflow-scrolling: touch;

  .lb-eyebrow {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;

  .lb-title { font-size: 1.2rem; font-weight: normal; margin-bottom: 0.4rem; }
  .lb-artist { font-size: 0.85rem; font-style: italic; color: rgba(255,255,255,0.55); margin-bottom: 0.8rem; }
  .lb-desc { font-size: 0.85rem; line-height: 1.7; color: #fff; margin-bottom: 1rem; }
  .lb-module {

    font-family: 'Courier New', Courier, monospace;
    font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
    background: rgba(0,0,0,0.5); border: none; cursor: pointer;
    padding: 0.3rem 0.6rem; color: #fff;
    transition: opacity 0.15s; z-index: 1;

function openLightbox(a) {
  document.getElementById('lb-img').src = a.img;
  document.getElementById('lb-img').alt = a.title;
  document.getElementById('lb-eyebrow').textContent = a.module;
  document.getElementById('lb-title').textContent = a.title;
  document.getElementById('lb-artist').textContent = a.artist;
  document.getElementById('lb-desc').textContent = a.desc;
  document.getElementById('lb-module').textContent = a.module;
  document.getElementById('lightbox').classList.add('open');
}

const grid = document.getElementById('grid');
ARTIFACTS.forEach(a => {
  const item = document.createElement('div');
  item.className = 'img-grid-item';
  item.innerHTML = `<img src="${a.img}" alt="${a.title}" loading="lazy"><div class="img-label">${a.title}</div>`;
  item.addEventListener('click', () => openLightbox(a));
  grid.appendChild(item);
});

document.getElementById('lb-close-btn').addEventListener('click', () =>
  document.getElementById('lightbox').classList.remove('open'));
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});
