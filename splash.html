<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Speculation Capsule — ART104</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    background: #f5f2ed url('images/splash_background.png') center center / cover no-repeat fixed;
    color: #111;
  }
  .overlay {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 4rem 2rem;
    background: rgba(245, 242, 237, 0.78);
  }
  .eyebrow {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: clamp(2.4rem, 8vw, 5.5rem);
    font-weight: normal;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 1.2rem;
    max-width: 700px;
  }
  .sub {
    font-size: 1rem;
    color: #444;
    margin-bottom: 2.5rem;
    font-style: italic;
  }
  .enter-link {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #111;
    text-decoration: none;
    border-bottom: 1px solid #111;
    padding-bottom: 2px;
    transition: opacity 0.2s;
  }
  .enter-link:hover { opacity: 0.5; }
  .meta {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    text-align: right;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="overlay">
  <p class="eyebrow">ART104 · Spring 2026</p>
  <h1>Speculation<br>Capsule</h1>
  <p class="sub">56 speculative artifacts</p>
  <a href="index.html" class="enter-link">Open Capsule →</a>
</div>
<div class="meta">
  37.9749°N · 122.0297°W<br>
  56 artifacts · 6 modules
</div>
</body>
</html>
